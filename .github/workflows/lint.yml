name: Lint Charts

on:
  pull_request:
    branches:
      - main
    paths:
      - "charts/**"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint changed charts
        run: |
          for chart in charts/*/; do
            echo "==> Linting $chart"
            helm lint --strict "$chart"
          done
