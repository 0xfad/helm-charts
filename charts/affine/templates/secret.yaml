{{- $manageSecret := eq (include "affine.createOwnSecret" .) "true" -}}
{{- $managePrivateKey := not .Values.affine.privateKey.existingSecret -}}
{{- if or $manageSecret $managePrivateKey }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "affine.secretName" . }}
  labels:
    {{- include "affine.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if $manageSecret }}
  db-password: {{ include "affine.database.plainPassword" . | quote }}
  {{- if and (not .Values.redis.enabled) .Values.externalRedis.password }}
  redis-password: {{ .Values.externalRedis.password | quote }}
  {{- end }}
  {{- end }}
  {{- if $managePrivateKey }}
  private-key: {{ include "affine.privateKey.value" . | quote }}
  {{- end }}
{{- end }}
